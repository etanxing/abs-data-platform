name = "abs-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "abs-data-prod"
database_id = "c5989af6-e454-4843-8e27-098eca650e49"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "reports-storage"

[[kv_namespaces]]
binding = "CACHE"
id = "a01d0b94f04444408b4a2b4308ceca56"

[vars]
DEMOREPORT_URL = "https://demoreport-40p.pages.dev"
GRANTDATA_URL = "https://grantdata.pages.dev"
# Override secrets in Cloudflare dashboard (Settings → Variables)
# or via `wrangler secret put <NAME>`
STRIPE_SECRET_KEY = "sk_test_placeholder"
STRIPE_WEBHOOK_SECRET = "whsec_placeholder"
JWT_SECRET = "changeme-replace-with-random-secret-in-production"
# Stripe Price IDs for GrantData subscription plans
STRIPE_PRICE_STARTER = "price_placeholder_starter"
STRIPE_PRICE_PROFESSIONAL = "price_placeholder_professional"
STRIPE_PRICE_TEAM = "price_placeholder_team"
