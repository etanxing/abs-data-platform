name = "abs-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

[alias]
# Force the browser build of @react-pdf/renderer — the default (Node) build uses
# renderToBuffer which is unavailable in Workers. The browser build uses pdf()
# which only needs standard Blob/ArrayBuffer APIs that Workers support.
"@react-pdf/renderer" = "../../packages/pdf-generator/node_modules/@react-pdf/renderer/lib/react-pdf.browser.js"

[[d1_databases]]
binding = "DB"
database_name = "abs-data-prod"
database_id = "c5989af6-e454-4843-8e27-098eca650e49"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "reports-storage"

[[kv_namespaces]]
binding = "CACHE"
id = "a01d0b94f04444408b4a2b4308ceca56"

[vars]
DEMOREPORT_URL = "https://demoreport-40p.pages.dev"
GRANTDATA_URL = "https://grantdata.pages.dev"
# Secrets are set via `wrangler secret put`:
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, JWT_SECRET
#   STRIPE_PRICE_STARTER, STRIPE_PRICE_PROFESSIONAL, STRIPE_PRICE_TEAM
