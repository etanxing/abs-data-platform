name = "abs-api"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]


[[d1_databases]]
binding = "DB"
database_name = "abs-data-prod"
database_id = "c5989af6-e454-4843-8e27-098eca650e49"

[[r2_buckets]]
binding = "REPORTS"
bucket_name = "reports-storage"

[[kv_namespaces]]
binding = "CACHE"
id = "a01d0b94f04444408b4a2b4308ceca56"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
DEMOREPORT_URL = "https://demoreport.workswell.com.au"
GRANTDATA_URL = "https://grantdata.workswell.com.au"
# Secrets are set via `wrangler secret put`:
#   STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, JWT_SECRET
#   STRIPE_PRICE_STARTER, STRIPE_PRICE_PROFESSIONAL, STRIPE_PRICE_TEAM
